<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusGG · Painel de Farm</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--border:rgba(255,255,255,0.07);--border-em:rgba(255,255,255,0.15);--text:#e8e9eb;--muted:#8a8d96;--hint:#4e5058;--gold:#d4a017;--gold-dim:rgba(212,160,23,0.12);--green:#4caf6e;--green-dim:rgba(76,175,110,0.12);--red:#e05c5c;--red-dim:rgba(224,92,92,0.12);--mono:'JetBrains Mono','Fira Code',monospace;--sans:'Inter','Segoe UI',system-ui,sans-serif;--r-sm:6px;--r-md:10px;--r-lg:14px}
    html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6}
    body{min-height:100vh;padding:2rem 1rem}
    .container{max-width:860px;margin:0 auto}
    #auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:2rem;width:320px}
    .auth-card h2{font-size:16px;font-weight:500;margin-bottom:.5rem}
    .auth-card p{font-size:12px;color:var(--muted);margin-bottom:1.25rem}
    .auth-card input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--r-sm);padding:8px 12px;font-size:13px;font-family:var(--mono);outline:none;margin-bottom:.75rem}
    .auth-card input:focus{border-color:var(--border-em)}
    .auth-error{font-size:12px;color:var(--red);margin-top:.5rem;display:none}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem}
    .header-left{display:flex;align-items:center;gap:12px}
    .faction-badge{font-size:10px;font-weight:600;letter-spacing:.12em;padding:4px 10px;border-radius:var(--r-sm);background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,160,23,.3);text-transform:uppercase}
    .header h1{font-size:17px;font-weight:500}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .status-bar{font-size:11px;color:var(--hint);font-family:var(--mono);display:flex;align-items:center;gap:4px}
    .section-label{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem}
    .stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}
    @media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:.9rem 1rem}
    .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
    .stat-value{font-size:20px;font-weight:600;font-family:var(--mono)}
    .stat-sub{font-size:10px;color:var(--hint);margin-top:2px;font-family:var(--mono)}
    .member-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem}
    .member-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:.9rem 1rem;transition:border-color .15s}
    .member-card:hover{border-color:var(--border-em)}
    .member-card.is-leader{border-color:rgba(212,160,23,.4)}
    .member-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .rank-badge{font-size:15px;min-width:24px;text-align:center}
    .member-name{font-size:14px;font-weight:500;flex:1}
    .status-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;letter-spacing:.04em}
    .pill-met{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,110,.25)}
    .pill-close{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,160,23,.25)}
    .pill-miss{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,92,92,.25)}
    .member-metas{display:flex;flex-direction:column;gap:7px}
    .meta-row{display:flex;align-items:center;gap:8px}
    .meta-icon{font-size:11px;color:var(--hint);font-family:var(--mono);min-width:12px}
    .meta-track{flex:1;height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
    .meta-fill{height:100%;border-radius:99px;transition:width .6s ease}
    .fill-green{background:#4caf6e}.fill-gold{background:#d4a017}.fill-red{background:#e05c5c}
    .meta-pct{font-size:11px;font-family:var(--mono);color:var(--muted);min-width:34px;text-align:right}
    .meta-val{font-size:11px;font-family:var(--mono);color:var(--hint);min-width:110px;text-align:right}
    .extra-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .extra-label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.08em}
    .extra-chip{font-size:11px;font-family:var(--mono);padding:2px 9px;border-radius:var(--r-sm);background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
    .extra-chip strong{color:var(--text)}
    .extra-chip.total{border-color:rgba(76,175,110,.3);background:var(--green-dim);color:var(--green)}
    .extra-chip.total strong{color:var(--green)}
    .sem-farm-section{margin-bottom:1.5rem}
    .sem-farm-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:.5rem}
    .sem-farm-chip{font-size:12px;padding:3px 10px;border-radius:99px;background:var(--red-dim);color:var(--red);border:1px solid rgba(224,92,92,.25)}
    .actions-row{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
    .btn{padding:7px 16px;font-size:12px;font-weight:500;border-radius:var(--r-sm);cursor:pointer;transition:background .15s;border:none}
    .btn-primary{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,160,23,.35)}
    .btn-primary:hover{background:rgba(212,160,23,.2)}
    .btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,92,92,.35)}
    .btn-danger:hover{background:rgba(224,92,92,.2)}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-top:1rem;border-top:1px solid var(--border)}
    .footer-info{font-size:11px;color:var(--hint);font-family:var(--mono)}
    .footer-taxa{display:flex;gap:14px;flex-wrap:wrap}
    .taxa-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
    .taxa-dot{width:7px;height:7px;border-radius:50%}
    .skeleton{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);height:80px;margin-bottom:6px;animation:shimmer 1.5s infinite}
    @keyframes shimmer{0%,100%{opacity:.5}50%{opacity:.8}}
  </style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2>NexusGG · Painel de Farm</h2>
    <p>Digite a chave de acesso configurada no servidor.</p>
    <input type="password" id="api-key-input" placeholder="API Key" autocomplete="off">
    <button class="btn btn-primary" style="width:100%" onclick="autenticar()">Entrar</button>
    <p class="auth-error" id="auth-error">Chave inválida ou servidor offline.</p>
  </div>
</div>

<div class="container" id="dashboard" style="display:none">
  <div class="header">
    <div class="header-left">
      <span class="faction-badge">NexusGG</span>
      <h1>Painel de farm semanal</h1>
    </div>
    <div class="status-bar"><span class="live-dot"></span><span id="status-txt">conectando...</span></div>
  </div>
  <div class="stats-row" id="stats-row"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="actions-row">
    <button class="btn btn-primary" onclick="buscarDados()">Atualizar agora</button>
    <button class="btn btn-danger" onclick="resetarFarm()" id="btn-reset">Resetar semana</button>
  </div>
  <div class="section-label">Ranking de membros</div>
  <div class="member-list" id="member-list"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="sem-farm-section" id="sem-farm-section"></div>
  <div class="footer">
    <span class="footer-info" id="footer-info">Aguardando dados...</span>
    <div class="footer-taxa">
      <span class="taxa-item"><span class="taxa-dot" style="background:#e05c5c"></span>Droga · 65%</span>
      <span class="taxa-item"><span class="taxa-dot" style="background:#5b9cf6"></span>Ação · 75%</span>
      <span class="taxa-item"><span class="taxa-dot" style="background:#4caf6e"></span>Livre · 100%</span>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const POLL_INTERVAL = 5000;
const TAXAS = {
  droga:{membro:.65,label:'Droga'},
  acao:{membro:.75,label:'Ação'},
  livre:{membro:1.00,label:'Livre'},
};
let apiKey = localStorage.getItem('nexus_api_key')||'';
let metaConfig = {dinheiroSujo:100000,componentes:5000,convLimpo:.5};

async function autenticar(){
  const input = document.getElementById('api-key-input').value.trim();
  if(!input)return;
  try{
    const res = await fetch(`${API_BASE}/api/farm`,{headers:{Authorization:input}});
    if(!res.ok)throw new Error();
    apiKey=input;
    localStorage.setItem('nexus_api_key',apiKey);
    document.getElementById('auth-overlay').style.display='none';
    document.getElementById('dashboard').style.display='block';
    iniciar();
  }catch{
    const e=document.getElementById('auth-error');
    e.style.display='block';
    setTimeout(()=>{e.style.display='none'},3000);
  }
}
document.getElementById('api-key-input').addEventListener('keydown',e=>{if(e.key==='Enter')autenticar()});
if(apiKey){document.getElementById('api-key-input').value=apiKey;autenticar();}

function calcular(m){
  const {dinheiroSujo:metaS,componentes:metaC,convLimpo}=metaConfig;
  const sujo=m.sujo||0,comp=m.comp||0;
  const pctSujo=metaS>0?Math.min(1,sujo/metaS):1;
  const pctComp=metaC>0?Math.min(1,comp/metaC):1;
  const bateuSujo=metaS>0?sujo>=metaS:true;
  const bateuComp=metaC>0?comp>=metaC:true;
  const bateuAlguma=bateuSujo||bateuComp;
  const excedenteSujo=metaS>0?Math.max(0,sujo-metaS):0;
  const breakdown=[];
  if(excedenteSujo>0){
    const totalCat=(m.droga||0)+(m.acao||0)+(m.livre||0)||1;
    for(const[chave,taxa]of Object.entries(TAXAS)){
      const val=m[chave]||0;if(val<=0)continue;
      const extra=Math.round(excedenteSujo*(val/totalCat));
      const doMembro=Math.round(extra*taxa.membro);
      const limpo=Math.round(doMembro*convLimpo);
      breakdown.push({label:taxa.label,extra,doMembro,limpo});
    }
  }
  return{pctSujo,pctComp,bateuSujo,bateuComp,bateuAlguma,excedenteSujo,breakdown,
    totalLimpo:breakdown.reduce((s,c)=>s+c.limpo,0),
    totalMembro:breakdown.reduce((s,c)=>s+c.doMembro,0)};
}

const R$=v=>'R$ '+Math.round(v).toLocaleString('pt-BR');
const Num=v=>Math.round(v).toLocaleString('pt-BR');
const Pct=v=>Math.min(100,Math.round(v))+'%';
const MEDALHAS=['🥇','🥈','🥉'];
const fillClass=p=>p>=1?'fill-green':p>=.5?'fill-gold':'fill-red';

function statusPill(res,m){
  if((m.sujo||0)+(m.comp||0)===0)return`<span class="status-pill pill-miss">Sem farm</span>`;
  if(res.bateuAlguma)return`<span class="status-pill pill-met">Meta batida</span>`;
  if(Math.max(res.pctSujo,res.pctComp)>=.75)return`<span class="status-pill pill-close">Quase lá</span>`;
  return`<span class="status-pill pill-miss">Pendente</span>`;
}

function renderBarras(m,res){
  const{dinheiroSujo:metaS,componentes:metaC}=metaConfig;
  let h='';
  if(metaS>0)h+=`<div class="meta-row"><span class="meta-icon">$</span><div class="meta-track"><div class="meta-fill ${fillClass(res.pctSujo)}" style="width:${Pct(res.pctSujo*100)}"></div></div><span class="meta-pct">${Pct(res.pctSujo*100)}</span><span class="meta-val">${R$(m.sujo||0)} / ${R$(metaS)}</span></div>`;
  if(metaC>0)h+=`<div class="meta-row"><span class="meta-icon">#</span><div class="meta-track"><div class="meta-fill ${fillClass(res.pctComp)}" style="width:${Pct(res.pctComp*100)}"></div></div><span class="meta-pct">${Pct(res.pctComp*100)}</span><span class="meta-val">${Num(m.comp||0)} / ${Num(metaC)} un</span></div>`;
  return h||`<span style="font-size:12px;color:var(--hint)">Sem registros</span>`;
}

function renderBreakdown(res){
  if(!res.breakdown.length)return'';
  const chips=res.breakdown.map(c=>`<span class="extra-chip">${c.label}: <strong>${R$(c.doMembro)}</strong> · limpo <strong>${R$(c.limpo)}</strong></span>`).join('');
  return`<div class="extra-row"><span class="extra-label">Excedente</span>${chips}<span class="extra-chip total">Limpo total: <strong>${R$(res.totalLimpo)}</strong></span></div>`;
}

function renderMembro(m,rank){
  const res=calcular(m);
  return`<div class="member-card ${rank===0?'is-leader':''}">
    <div class="member-top"><span class="rank-badge">${MEDALHAS[rank]??`<span style="font-size:12px;color:var(--hint)">${rank+1}</span>`}</span><span class="member-name">${m.nome||m.id}</span>${statusPill(res,m)}</div>
    <div class="member-metas">${renderBarras(m,res)}</div>${renderBreakdown(res)}</div>`;
}

function renderDados(farmDB){
  const lista=Object.entries(farmDB).map(([id,d])=>({id,...d})).sort((a,b)=>(b.sujo||0)-(a.sujo||0));
  const ativos=lista.filter(m=>(m.sujo||0)+(m.comp||0)>0);
  const inativos=lista.filter(m=>(m.sujo||0)+(m.comp||0)===0);
  let tSujo=0,tComp=0,metaBatida=0,totalLimpoGeral=0;
  ativos.forEach(m=>{tSujo+=m.sujo||0;tComp+=m.comp||0;const r=calcular(m);if(r.bateuAlguma)metaBatida++;totalLimpoGeral+=r.totalLimpo;});
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total sujo</div><div class="stat-value">${R$(tSujo)}</div><div class="stat-sub">semana atual</div></div>
    <div class="stat-card"><div class="stat-label">Componentes</div><div class="stat-value">${Num(tComp)}</div><div class="stat-sub">unidades</div></div>
    <div class="stat-card"><div class="stat-label">Meta batida</div><div class="stat-value">${metaBatida}/${ativos.length}</div><div class="stat-sub">membros ativos</div></div>
    <div class="stat-card"><div class="stat-label">Limpo total</div><div class="stat-value">${R$(totalLimpoGeral)}</div><div class="stat-sub">excedente convertido</div></div>`;
  document.getElementById('member-list').innerHTML=ativos.length?ativos.map((m,i)=>renderMembro(m,i)).join(''):`<p style="color:var(--hint);font-size:13px;padding:1rem 0">Nenhum registro esta semana.</p>`;
  document.getElementById('sem-farm-section').innerHTML=inativos.length?`<div class="section-label" style="margin-bottom:.5rem">Sem entrega (${inativos.length})</div><div class="sem-farm-list">${inativos.map(m=>`<span class="sem-farm-chip">${m.nome||m.id}</span>`).join('')}</div>`:'';
  document.getElementById('footer-info').textContent=`Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;
  document.getElementById('status-txt').textContent='ao vivo';
}

async function buscarDados(){
  try{
    const res=await fetch(`${API_BASE}/api/farm`,{headers:{Authorization:apiKey}});
    if(!res.ok)throw new Error();
    const json=await res.json();
    if(json.meta)metaConfig={dinheiroSujo:json.meta.dinheiroSujo||100000,componentes:json.meta.componentes||5000,convLimpo:json.meta.convLimpo||.5};
    renderDados(json.farm||{});
  }catch(e){document.getElementById('status-txt').textContent='offline';}
}

async function resetarFarm(){
  if(!confirm('Tem certeza que quer resetar o farm desta semana?\n\nEsta ação não pode ser desfeita.'))return;
  const btn=document.getElementById('btn-reset');
  btn.disabled=true;btn.textContent='Resetando...';
  try{
    const res=await fetch(`${API_BASE}/api/reset`,{method:'POST',headers:{Authorization:apiKey,'Content-Type':'application/json'},body:JSON.stringify({confirmar:true})});
    if(!res.ok)throw new Error();
    await buscarDados();alert('Farm resetado com sucesso!');
  }catch{alert('Erro ao resetar.');}
  finally{btn.disabled=false;btn.textContent='Resetar semana';}
}

function iniciar(){buscarDados();setInterval(buscarDados,POLL_INTERVAL);}
</script>
</body>
</html>
